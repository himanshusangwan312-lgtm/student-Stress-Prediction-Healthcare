<!DOCTYPE html>
<html>
<head>
    <title>Student Stress Predictor</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- ICONS (NEW 🔥) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CUSTOM DARK THEME -->
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
            font-family: 'Poppins', sans-serif;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.9) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
        }

        .navbar-brand {
            font-size: 20px;
            letter-spacing: 1px;
        }

        .nav-link:hover {
            color: #38bdf8 !important;
            transition: 0.2s;
        }

        .card {
            background: #1e293b;
            border-radius: 15px;
            border: none;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.6);
            color: #e2e8f0;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px) scale(1.01);
        }

        .btn-primary {
            background: linear-gradient(45deg, #6366f1, #06b6d4);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-warning {
            background: linear-gradient(45deg, #f59e0b, #f97316);
            border: none;
            color: white;
        }

        .btn-danger {
            background: linear-gradient(45deg, #ef4444, #dc2626);
            border: none;
        }

        .btn-light {
            background: #e2e8f0;
            border: none;
        }

        input, select, textarea {
            background: #0f172a !important;
            color: white !important;
            border: 1px solid #334155 !important;
            border-radius: 8px !important;
        }

        input::placeholder {
            color: #94a3b8;
        }

        h2, h3, h4, h5 {
            font-weight: 600;
        }

        /* Smooth Fade Animation */
        .container {
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar Styling (NEW 🔥) */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }

        /* Footer (NEW 🔥) */
        .footer {
            text-align: center;
            padding: 15px;
            margin-top: 40px;
            font-size: 14px;
            color: #94a3b8;
        }

    </style>

    <!-- AJAX CITY SCRIPT (UNCHANGED) -->
    <script>
        function loadCities(state) {

            if (state === "") {
                document.getElementById("city").innerHTML =
                    '<option value="">All</option>';
                return;
            }

            fetch("/get_cities/" + state)
                .then(response => response.json())
                .then(data => {

                    let cityDropdown = document.getElementById("city");
                    cityDropdown.innerHTML =
                        '<option value="">All</option>';

                    data.cities.forEach(function(city) {
                        cityDropdown.innerHTML +=
                            '<option value="' + city + '">' + city + '</option>';
                    });
                });
        }
    </script>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4">

    <a class="navbar-brand text-white fw-bold" href="/">
        <i class="fa-solid fa-brain"></i> StressPredict
    </a>

    <div class="navbar-nav me-auto">

        <a class="nav-link text-white" href="/">
            <i class="fa fa-home"></i> Home
        </a>

        <a class="nav-link text-white" href="/about">
            <i class="fa fa-info-circle"></i> About
        </a>

        <a class="nav-link text-white" href="/help">
            <i class="fa fa-question-circle"></i> Help
        </a>

        <a class="nav-link text-white" href="/doctors">
            <i class="fa fa-user-md"></i> Doctor Finder
        </a>

        <a class="nav-link text-white" href="/emergency">
            <i class="fa fa-triangle-exclamation"></i> Emergency
        </a>

        <a class="nav-link text-white" href="/chatbot">
            <i class="fa fa-robot"></i> Chatbot
        </a>

    </div>

    <!-- RIGHT SIDE ADMIN SECTION -->
    <div class="d-flex">

        {% if session.get("admin") %}
            <a class="btn btn-warning me-2" href="/admin/dashboard">
                <i class="fa fa-chart-line"></i> Dashboard
            </a>

            <a class="btn btn-danger" href="/admin/logout">
                <i class="fa fa-sign-out-alt"></i> Logout
            </a>
        {% else %}
            <a class="btn btn-light" href="/admin">
                <i class="fa fa-user-shield"></i> Admin Login
            </a>
        {% endif %}

    </div>

</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- FOOTER (NEW 🔥) -->
<div class="footer">
    © 2026 StressPredict AI | Final Year Project 🚀
</div>

</body>
</html>
